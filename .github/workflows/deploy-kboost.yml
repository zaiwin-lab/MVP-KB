name: Deploy KBOOST to Netlify

on:
  push:
    branches:
      - claude/kobe-mvp-kickoff-M45M3
      - main
    paths:
      - 'kboost/**'
      - 'netlify.toml'
  workflow_dispatch:
    inputs:
      netlify_token:
        description: 'Netlify auth token (one-time use)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kboost.netlify.app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify
        run: |
          INPUT_TOKEN="${{ inputs.netlify_token }}"
          STORED_TOKEN="${{ secrets.NETLIFY_AUTH_TOKEN }}"
          TOKEN="${INPUT_TOKEN:-$STORED_TOKEN}"
          echo "::add-mask::$TOKEN"
          npm install -g netlify-cli
          netlify deploy \
            --prod \
            --dir=kboost \
            --site=58206b7a-d3b4-43b8-aab9-6c60ae367760 \
            --auth="$TOKEN" \
            --message="Deploy from GitHub Actions — ${{ github.sha }}"
